services:
  - type: web
    name: merchant-health-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt && pip install greenlet
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./merchant_health.db
      - key: PYTHON_VERSION
        value: "3.13.0"
